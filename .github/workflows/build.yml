name: Build Windows EXE

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller --onefile --noconsole --noupx --name "nxlookup-web" --icon nxlookup.ico --add-data "nxlookup_web/templates;nxlookup_web/templates" run.py
      - run: Compress-Archive -Path dist/nxlookup-web.exe -DestinationPath dist/nxlookup-web.zip
      - uses: actions/upload-artifact@v4
        with: { name: nxlookup-web-windows, path: 'dist/nxlookup-web.*' }
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { name: nxlookup-web-windows }
      - uses: softprops/action-gh-release@v2
        with: { files: 'nxlookup-web.*', generate_release_notes: true }
